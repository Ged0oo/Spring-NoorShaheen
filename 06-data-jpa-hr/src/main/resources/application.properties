spring.application.name=data-jpa-hr

# Database Connection
# Ensure your MySQL is running on 3306 (your previous screenshot showed 3307)
spring.datasource.url=jdbc:mysql://localhost:3306/test?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root


# DDL Auto (Good for ITI tasks/testing)
spring.jpa.hibernate.ddl-auto=update

# SQL Logging & Statistics
logging.level.org.hibernate=info
logging.level.org.hibernate.SQL=debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Extensive Logging
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.type=trace
logging.level.org.hibernate.stat=debug

spring.jpa.properties.hibernate.jdbc.time_zone=UTC